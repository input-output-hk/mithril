## cargo nextest configuration file

# IVC SNARK proof generation tests are memory-heavy; running them concurrently
# causes resource contention on CI runners and exceeds the job time limit.
# Run serially to avoid contention.
[test-groups.ivc-snark-slow]
max-threads = 1

[test-groups.ivc-snark-very-slow]
max-threads = 1

[profile.ci]
# Print out output for failing tests as soon as they fail, and also at the end
# of the run (for easy scrollability).
failure-output = "immediate-final"
# Do not cancel the test run on the first failure.
fail-fast = false
# Report test as "slow" if they take more than 30s to run
slow-timeout = "30s"

[profile.ci.junit]
path = "tests-result.junit.xml"
report-name = "mithril-tests"

[[profile.ci.overrides]]
filter = 'test(#proof_system::ivc_halo2_snark::*slow::*) and not test(#*very_slow::*)'
test-group = "ivc-snark-slow"

[[profile.ci.overrides]]
filter = 'test(#proof_system::ivc_halo2_snark::*very_slow::*)'
test-group = "ivc-snark-very-slow"
